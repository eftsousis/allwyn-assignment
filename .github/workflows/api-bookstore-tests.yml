name: Bookstore API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_profile:
        description: 'Test profile to run (all, books, authors)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - books
          - authors

jobs:
  api-tests:
    name: Run Allwyn RESTapi Automation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests
        if: github.event.inputs.test_profile == '' || github.event.inputs.test_profile == 'all'
        run: mvn clean test -Dbase.url=https://fakerestapi.azurewebsites.net

      - name: Run Books tests only
        if: github.event.inputs.test_profile == 'books'
        run: mvn clean test -Pbooks -Dbase.url=https://fakerestapi.azurewebsites.net

      - name: Run Authors tests only
        if: github.event.inputs.test_profile == 'authors'
        run: mvn clean test -Pauthors -Dbase.url=https://fakerestapi.azurewebsites.net

      - name: Load test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs
          path: target/logs/
          retention-days: 7
